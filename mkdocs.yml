site_name: suap-api-wrapper
site_description: Python wrapper e CLI para a API v2 do SUAP
site_author: Junio Alves
site_url: https://junio-alves.github.io/suap-api-wrapper/
repo_url: https://github.com/Junio-Alves/suap-api-wrapper
repo_name: Junio-Alves/suap-api-wrapper
copyright: "Copyright &copy; 2026 <a href='https://github.com/Junio-Alves'>Junio Alves</a> &mdash; Licenciado sob a <a href='https://github.com/Junio-Alves/suap-api-wrapper/blob/main/LICENSE'>MIT License</a>"

theme:
  name: material
  language: pt
  logo: icon/cut.svg
  favicon: icon/cut.svg
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Junio-Alves
      name: Junio Alves no GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:frjunioalves@hotmail.com
      name: frjunioalves@hotmail.com
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/suap-api-wrapper/
      name: suap-api-wrapper no PyPI

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - 🏠 Início: index.md
  - 📦 Instalação: instalacao.md
  - 🔑 Autenticação: autenticacao.md
  - 💻 CLI:
      - 🗺️ Visão Geral: cli/index.md
      - 🔧 Módulo Comum: cli/comum.md
      - 🎓 Módulo Edu: cli/edu.md
  - 🐍 Biblioteca Python:
      - 🗺️ Visão Geral: biblioteca/index.md
      - 🌐 SuapClient: biblioteca/suap-client.md
      - 🔧 RecursoComum: biblioteca/recursos-comum.md
      - 🎓 RecursoEdu: biblioteca/recursos-edu.md
  - 💡 Exemplos:
      - 🗺️ Visão Geral: exemplos/index.md
      - 📊 Relatório de Notas: exemplos/relatorio-notas.md
      - 🤖 Bot de Notificação: exemplos/bot-notificacao.md
      - 📁 Exportar para CSV: exemplos/exportar-csv.md
  - ⚠️ Exceções: excecoes.md
  - 🔒 Segurança: seguranca.md
  - 🤝 Contribuindo: contribuindo.md
